<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Dark Light Theme Toggle</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#111827;
  --secondary:#6b7280;
  --shadow:0 10px 30px rgba(0,0,0,.08);
}

.dark{
  --bg:#0f172a;
  --card:#1e293b;
  --text:#f8fafc;
  --secondary:#94a3b8;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,Segoe UI,sans-serif;
  transition:all .35s ease;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:min(90%,500px);
}

.card{
  background:var(--card);
  border-radius:24px;
  padding:40px;
  text-align:center;
  box-shadow:var(--shadow);
  transition:.35s;
}

h1{
  font-size:2rem;
  margin-bottom:10px;
}

p{
  color:var(--secondary);
  margin-bottom:30px;
}

.theme-switch{
  position:relative;
  display:inline-block;
  width:80px;
  height:42px;
}

.theme-switch input{
  display:none;
}

.slider{
  position:absolute;
  inset:0;
  cursor:pointer;
  border-radius:999px;
  background:linear-gradient(
      135deg,
      #1e293b,
      #334155
  );
  transition:.4s;
  overflow:hidden;
}

.slider::before{
  content:"🌙";
  position:absolute;
  width:34px;
  height:34px;
  left:4px;
  top:4px;
  background:white;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  transition:.4s;
}

input:checked + .slider{
  background:linear-gradient(
      135deg,
      #60a5fa,
      #38bdf8
  );
}

input:checked + .slider::before{
  transform:translateX(38px);
  content:"☀️";
}

.status{
  margin-top:20px;
  font-size:15px;
  color:var(--secondary);
}

.dark .card{
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(15px);
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>Theme Switcher</h1>
    <p>Modern Dark & Light Mode Toggle</p>

    <label class="theme-switch">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>

    <div class="status" id="statusText">
      Light Mode Enabled
    </div>
  </div>
</div>

<script>
const toggle = document.getElementById("themeToggle");
const statusText = document.getElementById("statusText");

// Load saved theme
const savedTheme = localStorage.getItem("theme");

if(savedTheme){
    document.documentElement.classList.toggle(
        "dark",
        savedTheme === "dark"
    );
}else{
    const prefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)"
    ).matches;

    document.documentElement.classList.toggle(
        "dark",
        prefersDark
    );
}

updateUI();

toggle.addEventListener("change", () => {
    document.documentElement.classList.toggle("dark");

    const theme =
        document.documentElement.classList.contains("dark")
        ? "dark"
        : "light";

    localStorage.setItem("theme", theme);

    updateUI();
});

function updateUI(){
    const isDark =
        document.documentElement.classList.contains("dark");

    toggle.checked = isDark;

    statusText.textContent = isDark
        ? "Dark Mode Enabled 🌙"
        : "Light Mode Enabled ☀️";
}
</script>

</body>
</html>
