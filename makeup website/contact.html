<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Background */
.contact-section{
  background: linear-gradient(135deg, #fff0f5, #ffe6f0);
  font-family: Arial, sans-serif;
}

/* Card */
.contact-card{
  border: none;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* Inputs */
.form-control{
  border-radius: 10px;
  padding: 12px;
  border: 1px solid #eee;
}

.form-control:focus{
  border-color: #ff4d88;
  box-shadow: 0 0 0 0.2rem rgba(255,77,136,0.2);
}

/* Button */
.btn-pink{
  background: #ff4d88;
  color: white;
  padding: 12px;
  border-radius: 10px;
  font-weight: bold;
  transition: 0.3s;
  border: none;
}

.btn-pink:hover{
  background: #e6005c;
  transform: translateY(-2px);
}

/* Info card */
.info-card{
  background: white;
  padding: 15px;
  border-radius: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
  transition: 0.3s;
}

.info-card:hover{
  transform: translateY(-5px);
}

/* Location link */
.location-link{
  color: #ff4d88;
  font-weight: 600;
  text-decoration: none;
}

.location-link:hover{
  color: #e6005c;
  text-decoration: underline;
}

/* Map */
.map-container{
  border-radius: 15px;
  overflow: hidden;
  height: 250px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.map-container iframe{
  width: 100%;
  height: 100%;
  border: 0;
}

</style>
</head>

<body>
  <!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-light shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">GlowBeauty</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="offers.html">Offers</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<section class="contact-section py-5">

<div class="container">

  <!-- Heading -->
  <div class="text-center mb-5">
    <h2 class="fw-bold">Contact Us</h2>
    <p class="text-muted">We are here to help you anytime 💖</p>
  </div>

  <div class="row g-4 align-items-stretch">

    <!-- FORM -->
    <div class="col-lg-6 col-md-12">
      <div class="card contact-card p-4 h-100">

        <h4 class="mb-3">Send Message</h4>

        <form id="contactForm">

          <div class="mb-3">
            <label class="form-label">Your Name</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="5" required></textarea>
          </div>

          <button type="submit" class="btn btn-pink w-100">
            Send Message
          </button>

          <div id="msg" class="mt-3 text-center fw-bold"></div>

        </form>

      </div>
    </div>

    <!-- INFO -->
    <div class="col-lg-6 col-md-12">

      <div class="row g-3 mb-3">

        <!-- LOCATION -->
        <div class="col-12">
          <div class="info-card">
            📍 <b>Location:</b>
            <a href="https://www.google.com/maps?q=Karachi,+Sindh,+Pakistan"
               target="_blank"
               class="location-link">
              Karachi, Sindh, Pakistan
            </a>
          </div>
        </div>

        <div class="col-md-6">
          <div class="info-card">
            📞 <b>Phone</b><br>
            +92 300 1234567
          </div>
        </div>

        <div class="col-md-6">
          <div class="info-card">
            📧 <b>Email</b><br>
            info@beautystore.com
          </div>
        </div>

      </div>

      <!-- MAP (FIXED - NO ERROR) -->
      <div class="map-container">
        <iframe
          src="https://www.google.com/maps?q=24.8607,67.0011&output=embed"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>

    </div>

  </div>

</div>

</section>

<!-- JS -->
<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  const msg = document.getElementById("msg");
  msg.innerText = "Message sent successfully 💖";
  msg.style.color = "green";

  setTimeout(() => {
    msg.innerText = "";
  }, 3000);

  this.reset();
});
</script>


</body>
</html>
