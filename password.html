<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .login-box{
        background:#fff;
        padding:30px;
        width:350px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .login-box h1{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    .input-box{
        position:relative;
    }

    .input-box input{
        width:100%;
        padding:12px 45px 12px 12px;
        border:1px solid #ccc;
        border-radius:8px;
        outline:none;
        font-size:16px;
    }

    .eye{
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        font-size:20px;
        user-select:none;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:20px;
        border:none;
        border-radius:8px;
        background:#4facfe;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#2d8cff;
    }
</style>
</head>
<body>

<div class="login-box">
    <h1>Login</h1>

    <div class="input-box">
        <input type="password" id="pass" placeholder="Enter Password">
        <span class="eye" id="eye">👁️</span>
    </div>

    <button>Login</button>
</div>

<script>
    const pass = document.getElementById("pass");
    const eye = document.getElementById("eye");

    eye.addEventListener("click", () => {
        if(pass.type === "password"){
            pass.type = "text";
            eye.textContent = "🙈";
        }else{
            pass.type = "password";
            eye.textContent = "👁️";
        }
    });
</script>

</body>
</html>
